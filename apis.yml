aid: corning
name: Corning
x-type: company
description: >-
  Corning Incorporated is a Fortune 500 American technology company that
  specializes in glass science, ceramic science, and optical physics. Founded
  in 1851, Corning manufactures specialty glass, ceramics, and related
  materials and technologies for industrial and scientific applications.
  Corning's businesses include Optical Communications (fiber optic cable and
  hardware), Display Technologies (LCD and OLED glass substrates), Specialty
  Materials (Gorilla Glass for mobile devices), Environmental Technologies
  (ceramic substrates and filters for emissions control), and Life Sciences
  (laboratory glassware, cell culture, and bioprocess products). Corning
  does not publish a public developer API.
